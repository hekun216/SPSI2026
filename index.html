<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特种设备综合管理平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* 头部样式 */
        .header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; color: #88B5AE; }
        .header p { color: rgba(255,255,255,0.6); }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(136,181,174,0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(136,181,174,0.2);
        }
        .stat-card .number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #88B5AE;
        }
        .stat-card .label { color: rgba(255,255,255,0.6); margin-top: 5px; }
        
        /* 导航标签 */
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            flex-wrap: wrap;
        }
        .nav-tab {
            padding: 10px 20px;
            background: rgba(136,181,174,0.1);
            border: 1px solid rgba(136,181,174,0.2);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            color: rgba(255,255,255,0.8);
        }
        .nav-tab:hover, .nav-tab.active {
            background: rgba(136,181,174,0.3);
            color: #88B5AE;
        }
        
        /* 内容区域 */
        .content-section { display: none; }
        .content-section.active { display: block; }
        
        /* 操作按钮 */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #88B5AE, #5a8a84);
            color: white;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }
        .btn-danger {
            background: rgba(234,102,104,0.8);
            color: white;
        }
        .btn-danger:hover { background: rgba(234,102,104,1); }
        
        /* 搜索框 */
        .search-box {
            display: flex;
            gap: 10px;
        }
        .search-box input {
            padding: 10px 15px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: white;
            min-width: 200px;
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.4); }
        
        /* 表格样式 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
        }
        .data-table th, .data-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .data-table th {
            background: rgba(136,181,174,0.1);
            font-weight: 600;
            color: #88B5AE;
        }
        .data-table tr:hover { background: rgba(255,255,255,0.03); }
        .data-table .actions { display: flex; gap: 5px; }
        .data-table .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }
        
        /* 状态标签 */
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-normal { background: rgba(82,196,26,0.2); color: #52C41A; }
        .status-warning { background: rgba(250,173,20,0.2); color: #FAAD14; }
        .status-danger { background: rgba(234,102,104,0.2); color: #EA6668; }
        .status-pending { background: rgba(136,181,174,0.2); color: #88B5AE; }
        
        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 16px;
            padding: 30px;
            max-width: 700px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(136,181,174,0.2);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .modal-header h2 { color: #88B5AE; }
        .close-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 24px;
            cursor: pointer;
        }
        .close-btn:hover { color: white; }
        
        /* 表单样式 */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: 1 / -1; }
        .form-group label {
            margin-bottom: 8px;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 14px;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #88B5AE;
        }
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.4);
        }
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .form-grid { grid-template-columns: 1fr; }
            .data-table { font-size: 12px; }
            .data-table th, .data-table td { padding: 10px 8px; }
            .nav-tabs { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🏭 特种设备综合管理平台</h1>
            <p>企业设备全生命周期管理系统</p>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="number" id="stat-equipment">0</div>
                <div class="label">设备总数</div>
            </div>
            <div class="stat-card">
                <div class="number" id="stat-inspection">0</div>
                <div class="label">检查记录</div>
            </div>
            <div class="stat-card">
                <div class="number" id="stat-contract">0</div>
                <div class="label">合同数量</div>
            </div>
            <div class="stat-card">
                <div class="number" id="stat-safety">0</div>
                <div class="label">安全隐患</div>
            </div>
            <div class="stat-card">
                <div class="number" id="stat-expiring" style="color: #FAAD14;">0</div>
                <div class="label">即将到期</div>
            </div>
        </div>
        
        <!-- 导航标签 -->
        <div class="nav-tabs">
            <div class="nav-tab active" onclick="showSection('equipment')">🛠️ 设备管理</div>
            <div class="nav-tab" onclick="showSection('inspection')">📋 检查台账</div>
            <div class="nav-tab" onclick="showSection('contract')">📄 合同管理</div>
            <div class="nav-tab" onclick="showSection('safety')">🛡️ 安全检查</div>
        </div>
        
        <!-- 设备管理 -->
        <div id="section-equipment" class="content-section active">
            <div class="action-bar">
                <button class="btn btn-primary" onclick="openModal('equipment')">+ 添加设备</button>
                <div class="search-box">
                    <input type="text" id="search-equipment" placeholder="搜索设备名称/型号..." onkeyup="searchData('equipment')">
                </div>
            </div>
            <div id="equipment-table-container"></div>
        </div>
        
        <!-- 检查台账 -->
        <div id="section-inspection" class="content-section">
            <div class="action-bar">
                <button class="btn btn-primary" onclick="openModal('inspection')">+ 添加检查记录</button>
                <div class="search-box">
                    <input type="text" id="search-inspection" placeholder="搜索检查记录..." onkeyup="searchData('inspection')">
                </div>
            </div>
            <div id="inspection-table-container"></div>
        </div>
        
        <!-- 合同管理 -->
        <div id="section-contract" class="content-section">
            <div class="action-bar">
                <button class="btn btn-primary" onclick="openModal('contract')">+ 添加合同</button>
                <div class="search-box">
                    <input type="text" id="search-contract" placeholder="搜索合同..." onkeyup="searchData('contract')">
                </div>
            </div>
            <div id="contract-table-container"></div>
        </div>
        
        <!-- 安全检查 -->
        <div id="section-safety" class="content-section">
            <div class="action-bar">
                <button class="btn btn-primary" onclick="openModal('safety')">+ 添加检查记录</button>
                <div class="search-box">
                    <input type="text" id="search-safety" placeholder="搜索安全检查..." onkeyup="searchData('safety')">
                </div>
            </div>
            <div id="safety-table-container"></div>
        </div>
    </div>
    
    <!-- 模态框 -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">添加</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <form id="data-form" onsubmit="saveData(event)">
                <div id="form-fields"></div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 数据存储
        let data = {
            equipment: JSON.parse(localStorage.getItem('equipment') || '[]'),
            inspection: JSON.parse(localStorage.getItem('inspection') || '[]'),
            contract: JSON.parse(localStorage.getItem('contract') || '[]'),
            safety: JSON.parse(localStorage.getItem('safety') || '[]')
        };
        
        let currentSection = 'equipment';
        let editingId = null;
        
        // 表单字段定义
        const formFields = {
            equipment: [
                { name: 'name', label: '设备名称', type: 'text', required: true },
                { name: 'model', label: '设备型号', type: 'text', required: true },
                { name: 'manufacturer', label: '生产厂家', type: 'text' },
                { name: 'productionDate', label: '生产日期', type: 'date' },
                { name: 'installDate', label: '安装日期', type: 'date' },
                { name: 'location', label: '安装位置', type: 'text' },
                { name: 'inspectionDate', label: '检测日期', type: 'date' },
                { name: 'nextInspectionDate', label: '下次检测日期', type: 'date' },
                { name: 'status', label: '设备状态', type: 'select', options: ['正常', '维修中', '停用', '报废'] },
                { name: 'responsible', label: '负责人', type: 'text' },
                { name: 'remarks', label: '备注', type: 'textarea', fullWidth: true }
            ],
            inspection: [
                { name: 'equipmentId', label: '关联设备', type: 'select', options: [], required: true },
                { name: 'inspectionType', label: '检查类型', type: 'select', options: ['定期检验', '日常检查', '专项检查', '年度检查'] },
                { name: 'inspectionDate', label: '检查日期', type: 'date', required: true },
                { name: 'inspector', label: '检查人员', type: 'text' },
                { name: 'result', label: '检查结果', type: 'select', options: ['合格', '不合格', '需整改'] },
                { name: 'issues', label: '发现问题', type: 'textarea' },
                { name: 'rectification', label: '整改措施', type: 'textarea' },
                { name: 'rectificationDate', label: '整改日期', type: 'date' },
                { name: 'status', label: '处理状态', type: 'select', options: ['待处理', '处理中', '已完成'] }
            ],
            contract: [
                { name: 'contractNo', label: '合同编号', type: 'text', required: true },
                { name: 'type', label: '合同类型', type: 'select', options: ['维保合同', '采购合同', '租赁合同', '检测合同'] },
                { name: 'partyA', label: '甲方', type: 'text' },
                { name: 'partyB', label: '乙方', type: 'text' },
                { name: 'amount', label: '合同金额', type: 'number' },
                { name: 'startDate', label: '开始日期', type: 'date' },
                { name: 'endDate', label: '结束日期', type: 'date' },
                { name: 'equipmentIds', label: '关联设备', type: 'text', placeholder: '设备ID，多个用逗号分隔' },
                { name: 'content', label: '合同内容', type: 'textarea' },
                { name: 'status', label: '合同状态', type: 'select', options: ['生效中', '即将到期', '已到期', '已终止'] }
            ],
            safety: [
                { name: 'checkDate', label: '检查日期', type: 'date', required: true },
                { name: 'checker', label: '检查人', type: 'text' },
                { name: 'checkType', label: '检查类型', type: 'select', options: ['日常巡查', '专项检查', '季节性检查', '节假日前检查'] },
                { name: 'findings', label: '隐患描述', type: 'textarea', required: true },
                { name: 'severity', label: '严重程度', type: 'select', options: ['一般', '较大', '重大'] },
                { name: 'deadline', label: '整改期限', type: 'date' },
                { name: 'responsible', label: '责任人', type: 'text' },
                { name: 'status', label: '处理状态', type: 'select', options: ['待整改', '整改中', '已整改', '已验收'] },
                { name: 'photos', label: '现场照片', type: 'text', placeholder: '照片链接或描述' }
            ]
        };
        
        // 初始化
        function init() {
            updateStats();
            renderAllTables();
        }
        
        // 更新统计
        function updateStats() {
            document.getElementById('stat-equipment').textContent = data.equipment.length;
            document.getElementById('stat-inspection').textContent = data.inspection.length;
            document.getElementById('stat-contract').textContent = data.contract.length;
            document.getElementById('stat-safety').textContent = data.safety.filter(s => s.status !== '已验收').length;
            
            // 计算即将到期的设备（30天内）
            const today = new Date();
            const expiring = data.equipment.filter(e => {
                if (!e.nextInspectionDate) return false;
                const nextDate = new Date(e.nextInspectionDate);
                const diffDays = Math.ceil((nextDate - today) / (1000 * 60 * 60 * 24));
                return diffDays <= 30 && diffDays >= 0;
            });
            document.getElementById('stat-expiring').textContent = expiring.length;
        }
        
        // 切换标签页
        function showSection(section) {
            currentSection = section;
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('section-' + section).classList.add('active');
            renderTable(section);
        }
        
        // 渲染所有表格
        function renderAllTables() {
            ['equipment', 'inspection', 'contract', 'safety'].forEach(renderTable);
        }
        
        // 渲染表格
        function renderTable(section, searchTerm = '') {
            const container = document.getElementById(section + '-table-container');
            let items = data[section];
            
            if (searchTerm) {
                items = items.filter(item => 
                    Object.values(item).some(val => 
                        String(val).toLowerCase().includes(searchTerm.toLowerCase())
                    )
                );
            }
            
            if (items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>暂无数据，点击上方按钮添加</p>
                    </div>
                `;
                return;
            }
            
            let html = '<table class="data-table"><thead><tr>';
            const columns = getColumns(section);
            columns.forEach(col => html += '<th>' + col.label + '</th>');
            html += '<th>操作</th></tr></thead><tbody>';
            
            items.forEach(item => {
                html += '<tr>';
                columns.forEach(col => {
                    let value = item[col.key] || '-';
                    if (col.key === 'status') {
                        value = '<span class="status-badge status-' + getStatusClass(value) + '">' + value + '</span>';
                    }
                    html += '<td>' + value + '</td>';
                });
                html += `
                    <td class="actions">
                        <button class="btn btn-secondary btn-sm" onclick="editItem('section′,′{item.id}')">编辑</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteItem('section′,′{item.id}')">删除</button>
                    </td>
                </tr>`;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        // 获取表格列
        function getColumns(section) {
            const columns = {
                equipment: [
                    { key: 'name', label: '设备名称' },
                    { key: 'model', label: '型号' },
                    { key: 'location', label: '位置' },
                    { key: 'nextInspectionDate', label: '下次检测' },
                    { key: 'status', label: '状态' }
                ],
                inspection: [
                    { key: 'equipmentId', label: '设备' },
                    { key: 'inspectionType', label: '检查类型' },
                    { key: 'inspectionDate', label: '检查日期' },
                    { key: 'result', label: '结果' },
                    { key: 'status', label: '状态' }
                ],
                contract: [
                    { key: 'contractNo', label: '合同编号' },
                    { key: 'type', label: '类型' },
                    { key: 'partyB', label: '乙方' },
                    { key: 'endDate', label: '到期日' },
                    { key: 'status', label: '状态' }
                ],
                safety: [
                    { key: 'checkDate', label: '检查日期' },
                    { key: 'findings', label: '隐患描述' },
                    { key: 'severity', label: '严重程度' },
                    { key: 'deadline', label: '整改期限' },
                    { key: 'status', label: '状态' }
                ]
            };
            return columns[section];
        }
        
        // 获取状态样式类
        function getStatusClass(status) {
            const map = {
                '正常': 'normal', '合格': 'normal', '生效中': 'normal', '已整改': 'normal', '已验收': 'normal',
                '维修中': 'warning', '需整改': 'warning', '即将到期': 'warning', '整改中': 'warning', '处理中': 'warning',
                '停用': 'danger', '报废': 'danger', '不合格': 'danger', '已到期': 'danger', '重大': 'danger',
                '待处理': 'pending', '待整改': 'pending', '一般': 'pending'
            };
            return map[status] || 'pending';
        }
        
        // 打开模态框
        function openModal(section, id = null) {
            currentSection = section;
            editingId = id;
            const modal = document.getElementById('modal');
            const title = document.getElementById('modal-title');
            const formFields = document.getElementById('form-fields');
            
            const titles = { equipment: '设备', inspection: '检查记录', contract: '合同', safety: '安全检查' };
            title.textContent = (id ? '编辑' : '添加') + titles[section];
            
            // 生成表单字段
            let html = '<input type="hidden" name="id">';
            const fields = window.formFields[section];
            
            fields.forEach(field => {
                const fullWidth = field.fullWidth ? 'full-width' : '';
                html += '<div class="form-group ' + fullWidth + '">';
                html += '<label>' + field.label + (field.required ? ' *' : '') + '</label>';
                
                if (field.type === 'select') {
                    html += '<select name="' + field.name + '"' + (field.required ? ' required' : '') + '>';
                    html += '<option value="">请选择</option>';
                    
                    // 如果是设备选择，动态加载设备列表
                    if (field.name === 'equipmentId' && section === 'inspection') {
                        data.equipment.forEach(eq => {
                            html += '<option value="' + eq.id + '">' + eq.name + ' (' + eq.model + ')</option>';
                        });
                    } else {
                        field.options.forEach(opt => {
                            html += '<option value="' + opt + '">' + opt + '</option>';
                        });
                    }
                    html += '</select>';
                } else if (field.type === 'textarea') {
                    html += '<textarea name="' + field.name + '" placeholder="' + (field.placeholder || '') + '"></textarea>';
                } else {
                    html += '<input type="' + field.type + '" name="' + field.name + '" placeholder="' + (field.placeholder || '') + '"' + (field.required ? ' required' : '') + '>';
                }
                html += '</div>';
            });
            
            formFields.innerHTML = html;
            
            // 如果是编辑，填充数据
            if (id) {
                const item = data[section].find(i => i.id === id);
                if (item) {
                    Object.keys(item).forEach(key => {
                        const input = document.querySelector('[name="' + key + '"]');
                        if (input) input.value = item[key];
                    });
                }
            } else {
                document.querySelector('[name="id"]').value = Date.now().toString();
            }
            
            modal.classList.add('active');
        }
        
        // 关闭模态框
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            editingId = null;
        }
        
        // 保存数据
        function saveData(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const item = {};
            formData.forEach((value, key) => item[key] = value);
            
            if (editingId) {
                const index = data[currentSection].findIndex(i => i.id === editingId);
                if (index !== -1) data[currentSection][index] = item;
            } else {
                data[currentSection].push(item);
            }
            
            localStorage.setItem(currentSection, JSON.stringify(data[currentSection]));
            closeModal();
            renderTable(currentSection);
            updateStats();
        }
        
        // 编辑项目
        function editItem(section, id) {
            openModal(section, id);
        }
        
        // 删除项目
        function deleteItem(section, id) {
            if (confirm('确定要删除这条记录吗？')) {
                data[section] = data[section].filter(i => i.id !== id);
                localStorage.setItem(section, JSON.stringify(data[section]));
                renderTable(section);
                updateStats();
            }
        }
        
        // 搜索数据
        function searchData(section) {
            const searchTerm = document.getElementById('search-' + section).value;
            renderTable(section, searchTerm);
        }
        
        // 点击模态框外部关闭
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        // 初始化
        init();
    </script>
</body>
</html>
